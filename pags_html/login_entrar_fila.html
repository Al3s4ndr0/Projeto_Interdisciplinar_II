<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - IdentificaÃ§Ã£o</title>
  <link rel="stylesheet" href="/pags_css/style.css" />
</head>

<body class="tema-fila">
  <main class="tela">
    <section class="cartao cartao-formulario">

      <section class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="/pags_html/index.html" class="botao-home" aria-label="Ir para a tela inicial">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <img src="/images/banner_restaurante.png" class="imagem-restaurante" alt="Imagem do restaurante">
      </section>

      <section class="conteudo">
        <div class="bloco-identificacao">
          <h1 class="titulo titulo-centralizado">Entre na fila</h1>

          <p class="descricao-fila">
            Informe seu CPF para continuar. Se for seu primeiro acesso, solicitaremos os demais dados para cadastro.
            Caso jÃ¡ possua cadastro, seus dados serÃ£o preenchidos automaticamente e poderÃ£o ser editados.
          </p>

          <form class="formulario formulario-identificacao" id="formLoginFila">
            <div class="grupo-campo">
              <label for="cpf" class="label-campo">CPF</label>
              <input
                type="text"
                id="cpf"
                class="campo"
                placeholder="Qual Ã© o seu CPF? *"
                maxlength="14"
                required
              />
            </div>

            <div id="camposComplementares" class="campos-complementares">
              <div class="grupo-campo">
                <label for="nome" class="label-campo">Nome</label>
                <input
                  type="text"
                  id="nome"
                  class="campo"
                  placeholder="Qual Ã© o seu nome? *"
                />
              </div>

              <div class="grupo-campo">
                <label for="telefone" class="label-campo">Telefone</label>
                <input
                  type="text"
                  id="telefone"
                  class="campo"
                  placeholder="Qual Ã© o seu telefone? *"
                  maxlength="15"
                />
              </div>

              <div class="grupo-campo">
                <label for="qtdPessoas" class="label-campo">Mesa para quantas pessoas?</label>

                <div class="linha-qtd-pessoas">
                  <input
                    type="number"
                    id="qtdPessoas"
                    class="campo campo-destaque-fila campo-qtd-pessoas"
                    placeholder="Qtd."
                    min="1"
                    max="20"
                  />

                  <div class="acoes-qtd">
                    <button id="btnMenosPessoa" class="botao-qtd menos" type="button" aria-label="Diminuir quantidade"></button>
                    <button id="btnMaisPessoa" class="botao-qtd mais" type="button" aria-label="Aumentar quantidade"></button>
                  </div>
                </div>
              </div>
            </div>

            <button type="button" class="botao-primario" id="btnAcaoFila">
              Continuar
            </button>

            <p id="mensagem" class="mensagem-formulario"></p>
          </form>
        </div>
      </section>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://jlfbzdqhaezdtyyajqlk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA'
    );

    const form = document.getElementById('formLoginFila');
    const cpfInput = document.getElementById('cpf');
    const nome = document.getElementById('nome');
    const telefone = document.getElementById('telefone');
    const qtdPessoas = document.getElementById('qtdPessoas');
    const camposComplementares = document.getElementById('camposComplementares');
    const btnAcaoFila = document.getElementById('btnAcaoFila');
    const mensagem = document.getElementById('mensagem');
    const btnMenosPessoa = document.getElementById('btnMenosPessoa');
    const btnMaisPessoa = document.getElementById('btnMaisPessoa');

    const STATUS_EM_FILA = ['Aguardando', 'Preparando', 'Chamado'];

    let cpfConsultado = false;
    let clienteId = null;

    function somenteNumeros(valor) {
      return String(valor || '').replace(/\D/g, '');
    }

    function validarCPF(cpf) {
      cpf = somenteNumeros(cpf);

      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

      let soma = 0;
      let resto;

      for (let i = 1; i <= 9; i++) {
        soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(9, 10))) return false;

      soma = 0;

      for (let i = 1; i <= 10; i++) {
        soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;

      return resto === parseInt(cpf.substring(10, 11));
    }

    function validarTelefone(tel) {
      const numeros = somenteNumeros(tel);
      return numeros.length === 10 || numeros.length === 11;
    }

    function mostrarCamposComplementares() {
      camposComplementares.classList.add('ativo');
      qtdPessoas.required = true;
      nome.required = true;
      telefone.required = true;
    }

    function esconderCamposComplementares() {
      camposComplementares.classList.remove('ativo');
      qtdPessoas.required = false;
      nome.required = false;
      telefone.required = false;
    }

    async function buscarFilaAtivaPorCliente(idCliente) {
      const { data, error } = await supabaseClient
        .from('fila_item')
        .select(`
          id,
          status,
          posicao,
          tempo_estimado,
          numero_pessoas,
          hora_entrada,
          restaurante_id
        `)
        .eq('cliente_id', idCliente)
        .in('status', STATUS_EM_FILA)
        .order('hora_entrada', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) throw error;

      return data;
    }

    function formatarTelefone(telefone) {
      let valor = String(telefone || '').replace(/\D/g, '').slice(0, 11);

      if (valor.length <= 10) {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
      }

      return valor;
    }

    function restaurarSessaoFila(cliente, fila) {
      sessionStorage.setItem('cliente_id', cliente.id);
      sessionStorage.setItem('fila_item_id', fila.id);
      sessionStorage.setItem('fila_ativa', 'true');
      sessionStorage.setItem('fila_nome', cliente.nome || '');
      sessionStorage.setItem('fila_cpf', cliente.cpf || '');
      sessionStorage.setItem('fila_telefone', cliente.telefone || '');
      sessionStorage.setItem('fila_qtd_pessoas', fila.numero_pessoas || '');
      sessionStorage.setItem('fila_posicao', fila.posicao || '');
      sessionStorage.setItem('fila_tempo_estimado', fila.tempo_estimado || '');
    }

    function redirecionarFilaAtiva(fila) {
      if (fila.status === 'Aguardando') {
        window.location.href = 'fila_confirmada.html';
      } else {
        window.location.href = 'acompanhar_fila.html';
      }
    }

    cpfInput.addEventListener('input', function () {
      let valor = somenteNumeros(cpfInput.value).slice(0, 11);

      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      cpfInput.value = valor;

      cpfConsultado = false;
      clienteId = null;

      nome.value = '';
      telefone.value = '';
      qtdPessoas.value = '';

      esconderCamposComplementares();

      btnAcaoFila.type = 'button';
      btnAcaoFila.textContent = 'Continuar';

      mensagem.textContent = '';
    });

    telefone.addEventListener('input', function () {
      let valor = somenteNumeros(telefone.value).slice(0, 11);

      if (valor.length <= 10) {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
      }

      telefone.value = valor;
    });

    btnMenosPessoa.addEventListener('click', function () {
      let valorAtual = Number(qtdPessoas.value) || 1;

      if (valorAtual > 1) {
        qtdPessoas.value = valorAtual - 1;
      }
    });

    btnMaisPessoa.addEventListener('click', function () {
      let valorAtual = Number(qtdPessoas.value) || 0;

      if (valorAtual < 20) {
        qtdPessoas.value = valorAtual + 1;
      }
    });

    async function consultarCPF() {
      const cpfLimpo = somenteNumeros(cpfInput.value);

      mensagem.textContent = '';

      if (!validarCPF(cpfLimpo)) {
        mensagem.textContent = 'CPF invÃ¡lido. Verifique o nÃºmero informado.';
        mensagem.style.color = 'red';
        return;
      }

      btnAcaoFila.disabled = true;
      btnAcaoFila.textContent = 'Consultando...';

      try {
        const { data, error } = await supabaseClient
          .from('cliente')
          .select('id, nome, telefone, cpf')
          .eq('cpf', cpfLimpo)
          .maybeSingle();

        if (error) throw error;

        if (data) {
          const filaAtiva = await buscarFilaAtivaPorCliente(data.id);

          if (filaAtiva) {
            restaurarSessaoFila(data, filaAtiva);
            redirecionarFilaAtiva(filaAtiva);
            return;
          }
        }

        mostrarCamposComplementares();
        cpfConsultado = true;

        if (data) {
          clienteId = data.id;
          nome.value = data.nome || '';
          telefone.value = formatarTelefone(data.telefone || '');

          mensagem.textContent = 'Cadastro encontrado. Confira os dados antes de continuar.';
          mensagem.style.color = 'green';
        } else {
          clienteId = null;
          nome.value = '';
          telefone.value = '';

          mensagem.textContent = 'CPF nÃ£o localizado. Complete os dados para criar seu cadastro.';
          mensagem.style.color = '#d97706';
        }

        if (!qtdPessoas.value) {
          qtdPessoas.value = 1;
        }

        btnAcaoFila.type = 'submit';
        btnAcaoFila.textContent = 'Continuar';
        nome.focus();

      } catch (error) {
        console.error('Erro ao consultar CPF:', error);
        mensagem.textContent = 'NÃ£o foi possÃ­vel consultar o CPF no momento.';
        mensagem.style.color = 'red';
      } finally {
        btnAcaoFila.disabled = false;
      }
    }

    btnAcaoFila.addEventListener('click', function () {
      if (!cpfConsultado) {
        consultarCPF();
      }
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const cpfLimpo = somenteNumeros(cpfInput.value);
      const qtd = Number(qtdPessoas.value);
      const nomeCliente = nome.value.trim();
      const telefoneCliente = telefone.value.trim();

      if (!cpfConsultado) {
        consultarCPF();
        return;
      }

      if (!validarCPF(cpfLimpo)) {
        mensagem.textContent = 'CPF invÃ¡lido.';
        mensagem.style.color = 'red';
        return;
      }

      if (!nomeCliente) {
        mensagem.textContent = 'Informe o nome.';
        mensagem.style.color = 'red';
        return;
      }

      if (!validarTelefone(telefoneCliente)) {
        mensagem.textContent = 'Telefone invÃ¡lido. Informe DDD + nÃºmero.';
        mensagem.style.color = 'red';
        return;
      }

      if (!qtd || qtd < 1) {
        mensagem.textContent = 'Informe a quantidade de pessoas.';
        mensagem.style.color = 'red';
        return;
      }

      sessionStorage.setItem('cliente_id', clienteId || '');
      sessionStorage.setItem('fila_cpf', cpfLimpo);
      sessionStorage.setItem('fila_nome', nomeCliente);
      sessionStorage.setItem('fila_telefone', somenteNumeros(telefoneCliente));
      sessionStorage.setItem('fila_qtd_pessoas', qtd);

      window.location.href = 'revisar_fila.html';
    });

    async function carregarDadosSalvosAoVoltar() {
      const filaAtiva = sessionStorage.getItem('fila_ativa');
      const filaItemId = sessionStorage.getItem('fila_item_id');

      if (filaAtiva === 'true' && filaItemId) {
        const { data, error } = await supabaseClient
          .from('fila_item')
          .select('id, status')
          .eq('id', filaItemId)
          .maybeSingle();

        if (!error && data && STATUS_EM_FILA.includes(data.status)) {
          redirecionarFilaAtiva(data);
          return;
        }
      }

      const cpfSalvo = sessionStorage.getItem('fila_cpf');
      const nomeSalvo = sessionStorage.getItem('fila_nome');
      const telefoneSalvo = sessionStorage.getItem('fila_telefone');
      const qtdSalva = sessionStorage.getItem('fila_qtd_pessoas');
      const clienteIdSalvo = sessionStorage.getItem('cliente_id');

      if (!cpfSalvo && !nomeSalvo && !telefoneSalvo && !qtdSalva) {
        esconderCamposComplementares();
        return;
      }

      let cpfFormatado = somenteNumeros(cpfSalvo).slice(0, 11);
      cpfFormatado = cpfFormatado.replace(/(\d{3})(\d)/, '$1.$2');
      cpfFormatado = cpfFormatado.replace(/(\d{3})(\d)/, '$1.$2');
      cpfFormatado = cpfFormatado.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      cpfInput.value = cpfFormatado;
      nome.value = nomeSalvo || '';
      telefone.value = telefoneSalvo || '';
      qtdPessoas.value = qtdSalva || 1;

      clienteId = clienteIdSalvo || null;
      cpfConsultado = true;

      mostrarCamposComplementares();

      btnAcaoFila.type = 'submit';
      btnAcaoFila.textContent = 'Continuar';

      mensagem.textContent = 'Dados recuperados. VocÃª pode revisar ou continuar.';
      mensagem.style.color = 'green';
    }

    carregarDadosSalvosAoVoltar();
  </script>
</body>
</html>
