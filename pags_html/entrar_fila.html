<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Entrar na fila</title>
  <link rel="stylesheet" href="../pags_css/entrar_fila_style.css" />
</head>
<body>
  <main class="screen">
    <section class="card">

      <header class="top-image">
        <a href="index.html" class="back-button" aria-label="Voltar">
          &#8592;
        </a>

        <img src="../images/banner_restaurante.png" alt="Imagem do restaurante" class="banner-img" />

        <div class="badge-circle">
          <img src="../images/logo_restaurante.png" alt="Selo Restaurant" />
        </div>
      </header>

      <section class="content">
        <h1>Preencha seus dados para entrar na fila:</h1>

        <form class="queue-form">
          <input type="text" placeholder="Qual é o seu nome? *" />
          <input type="text" placeholder="Qual é o seu CPF? *" />
          <input type="text" placeholder="Qual é o seu telefone? *" />
          <input type="text" placeholder="Mesa para quantas pessoas? *" />

          <p class="info-text">
            Seus dados serão utilizados<br />
            exclusivamente para fins de reserva.
          </p>

          <a href="../pags_html/revisar_fila.html" class="btn-continue">Continuar</a>
        </form>
      </section>

      <footer class="footer-nav">
      </footer>

    </section>
  </main>
</body>
</html>
