<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Sua mesa está pronta</title>
  <link rel="stylesheet" href="../pags_css/acompanhar_fila_3_style.css">
</head>
<body>
  <main class="screen">

          &#8592;

        <div class="brand-logo">

      <section class="content">
        <h1>Sua mesa está pronta! Dirija-se ao balcão</h1>

        <div class="actions">
          <a href="../pags_html/experiencia_fila.html" class="btn btn-success">Estou indo!</a>
