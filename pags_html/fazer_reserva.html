<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Fazer reserva</title>
  <link rel="stylesheet" href="/pags_css/style.css" />
</head>
<body class="tema-reserva">

  <main class="tela">
    <section class="cartao cartao-formulario">

      <section class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="/pags_html/index.html" class="botao-home" aria-label="Ir para inicio">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <img src="/images/banner_restaurante.png" alt="Imagem do restaurante" class="imagem-restaurante" />

        <div class="selo">
          <img src="/images/logo_restaurante.png" alt="Logo do restaurante" />
        </div>
      </section>

      <section class="conteudo">
        <div class="bloco-identificacao bloco-reserva">
          <h1 class="titulo titulo-centralizado">Fazer reserva</h1>

          <p class="descricao-fila">
            Primeiro escolha data, horario e quantidade. Depois consultaremos seu CPF para preencher ou cadastrar seus dados.
          </p>

          <form class="formulario formulario-identificacao formulario-reserva" id="formReserva">
            <section class="etapa-reserva etapa-reserva-ativa" id="etapaAgenda" aria-label="Dados da reserva">
              <div class="grupo-campo">
                <label for="dataReserva" class="label-campo">Data da reserva</label>
                <input type="date" id="dataReserva" class="campo campo-reserva" required />
              </div>

              <div class="grupo-campo">
                <label for="horarioReserva" class="label-campo">Horario da reserva</label>
                <input
                  type="time"
                  id="horarioReserva"
                  class="campo campo-reserva"
                  min="11:00"
                  max="23:00"
                  step="900"
                  required
                />
              </div>

              <div class="grupo-campo">
                <label for="qtdPessoasReserva" class="label-campo">Mesa para quantas pessoas?</label>

                <div class="linha-qtd-pessoas">
                  <input
                    type="number"
                    id="qtdPessoasReserva"
                    class="campo campo-reserva campo-qtd-pessoas"
                    min="1"
                    max="20"
                    value="2"
                    required
                  />

                  <div class="acoes-qtd">
                    <button id="btnMenosReserva" class="botao-qtd menos botao-qtd-reserva" type="button" aria-label="Diminuir quantidade"></button>
                    <button id="btnMaisReserva" class="botao-qtd mais botao-qtd-reserva" type="button" aria-label="Aumentar quantidade"></button>
                  </div>
                </div>
              </div>
            </section>

            <section class="etapa-reserva" id="etapaCliente" aria-label="Identificacao do cliente">
              <div class="resumo-reserva-escolhida" id="resumoReservaEscolhida"></div>

              <div class="grupo-campo">
                <label for="cpfReserva" class="label-campo">CPF</label>
                <input
                  type="text"
                  id="cpfReserva"
                  class="campo campo-reserva"
                  placeholder="Qual e o seu CPF? *"
                  maxlength="14"
                />
              </div>

              <div id="dadosClienteReserva" class="campos-complementares">
                <div class="grupo-campo">
                  <label for="nomeReserva" class="label-campo">Nome</label>
                  <input type="text" id="nomeReserva" class="campo campo-reserva" placeholder="Qual e o seu nome? *" />
                </div>

                <div class="grupo-campo">
                  <label for="telefoneReserva" class="label-campo">Telefone</label>
                  <input
                    type="text"
                    id="telefoneReserva"
                    class="campo campo-reserva"
                    placeholder="Qual e o seu telefone? *"
                    maxlength="15"
                  />
                </div>

                <div class="grupo-campo">
                  <label for="emailReserva" class="label-campo">Email</label>
                  <input
                    type="email"
                    id="emailReserva"
                    class="campo campo-reserva"
                    placeholder="Qual e o seu email? *"
                  />
                </div>
              </div>
            </section>

            <div class="acoes-reserva-fluxo" id="acoesReservaFluxo">
              <button type="button" class="botao-secundario botao-reserva-voltar" id="btnVoltarEtapaReserva">
                Voltar
              </button>

              <button type="submit" class="botao-primario" id="btnReservaAcao">
                Continuar
              </button>
            </div>

            <p id="mensagemReserva" class="mensagem-formulario"></p>
          </form>
        </div>
      </section>

    </section>
  </main>

  <div class="modal-status-overlay modal-reserva-duplicada-overlay" id="modalReservaDuplicadaOverlay">
    <div class="modal-status modal-reserva-duplicada" role="dialog" aria-modal="true" aria-labelledby="modalReservaDuplicadaTitulo">
      <div class="modal-status-header">
        <h2 class="modal-status-titulo" id="modalReservaDuplicadaTitulo">Reserva ja existente</h2>
        <button class="modal-status-fechar" id="btnFecharModalReservaDuplicada" type="button" aria-label="Fechar modal">&times;</button>
      </div>

      <div class="modal-status-body">
        <p class="modal-status-texto" id="modalReservaDuplicadaTexto">
          Ja existe uma reserva ativa para este CPF nesta data e horario.
        </p>

        <div class="modal-reserva-validacao">
          <label for="ultimosDigitosTelefoneReserva">Para editar, confirme os 4 ultimos digitos do telefone</label>
          <input
            type="text"
            id="ultimosDigitosTelefoneReserva"
            class="campo"
            maxlength="4"
            inputmode="numeric"
            placeholder="0000"
          />
          <p id="mensagemModalReservaDuplicada" class="modal-fila-mensagem"></p>
        </div>

        <div class="modal-status-acoes">
          <button type="button" class="botao-secundario" id="btnEntendiReservaDuplicada">
            Entendi
          </button>

          <button type="button" class="botao-primario" id="btnEditarReservaDuplicada">
            Editar reserva
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://jlfbzdqhaezdtyyajqlk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA'
    );

    const formReserva = document.getElementById('formReserva');
    const etapaAgenda = document.getElementById('etapaAgenda');
    const etapaCliente = document.getElementById('etapaCliente');
    const dataReserva = document.getElementById('dataReserva');
    const horarioReserva = document.getElementById('horarioReserva');
    const qtdPessoasReserva = document.getElementById('qtdPessoasReserva');
    const cpfReserva = document.getElementById('cpfReserva');
    const nomeReserva = document.getElementById('nomeReserva');
    const telefoneReserva = document.getElementById('telefoneReserva');
    const emailReserva = document.getElementById('emailReserva');
    const dadosClienteReserva = document.getElementById('dadosClienteReserva');
    const btnMenosReserva = document.getElementById('btnMenosReserva');
    const btnMaisReserva = document.getElementById('btnMaisReserva');
    const btnVoltarEtapaReserva = document.getElementById('btnVoltarEtapaReserva');
    const btnReservaAcao = document.getElementById('btnReservaAcao');
    const acoesReservaFluxo = document.getElementById('acoesReservaFluxo');
    const mensagemReserva = document.getElementById('mensagemReserva');
    const resumoReservaEscolhida = document.getElementById('resumoReservaEscolhida');
    const modalReservaDuplicadaOverlay = document.getElementById('modalReservaDuplicadaOverlay');
    const modalReservaDuplicadaTexto = document.getElementById('modalReservaDuplicadaTexto');
    const ultimosDigitosTelefoneReserva = document.getElementById('ultimosDigitosTelefoneReserva');
    const mensagemModalReservaDuplicada = document.getElementById('mensagemModalReservaDuplicada');
    const btnFecharModalReservaDuplicada = document.getElementById('btnFecharModalReservaDuplicada');
    const btnEntendiReservaDuplicada = document.getElementById('btnEntendiReservaDuplicada');
    const btnEditarReservaDuplicada = document.getElementById('btnEditarReservaDuplicada');

    const RESTAURANTE_ID = '00000000-0000-0000-0000-000000000001';

    let etapaAtual = 'agenda';
    let cpfConsultado = false;
    let clienteId = null;
    let reservaDuplicadaAtual = null;

    function somenteNumeros(valor) {
      return String(valor || '').replace(/\D/g, '');
    }

    function hojeISO() {
      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = String(hoje.getMonth() + 1).padStart(2, '0');
      const dia = String(hoje.getDate()).padStart(2, '0');
      return `${ano}-${mes}-${dia}`;
    }

    function formatarDataBR(dataISO) {
      if (!dataISO) return '';
      const [ano, mes, dia] = dataISO.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    function formatarTelefone(valor) {
      let numeros = somenteNumeros(valor).slice(0, 11);

      if (numeros.length <= 10) {
        numeros = numeros.replace(/(\d{2})(\d)/, '($1) $2');
        numeros = numeros.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        numeros = numeros.replace(/(\d{2})(\d)/, '($1) $2');
        numeros = numeros.replace(/(\d{5})(\d)/, '$1-$2');
      }

      return numeros;
    }

    function validarCPF(cpf) {
      cpf = somenteNumeros(cpf);

      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

      let soma = 0;
      let resto;

      for (let i = 1; i <= 9; i++) {
        soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;
      if (resto !== parseInt(cpf.substring(9, 10))) return false;

      soma = 0;

      for (let i = 1; i <= 10; i++) {
        soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10 || resto === 11) resto = 0;

      return resto === parseInt(cpf.substring(10, 11));
    }

    function validarTelefone(valor) {
      const numeros = somenteNumeros(valor);
      return numeros.length === 10 || numeros.length === 11;
    }

    function validarEmail(valor) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(valor || '').trim());
    }

    function mostrarMensagemReserva(texto, tipo = 'erro') {
      mensagemReserva.textContent = texto;
      mensagemReserva.style.color = tipo === 'sucesso' ? 'green' : tipo === 'alerta' ? '#d97706' : 'red';
    }

    function limparMensagemReserva() {
      mensagemReserva.textContent = '';
    }

    function alterarQuantidadeReserva(delta) {
      const valorAtual = Number(qtdPessoasReserva.value) || 1;
      const novoValor = Math.min(20, Math.max(1, valorAtual + delta));
      qtdPessoasReserva.value = novoValor;
    }

    function irParaEtapa(etapa) {
      etapaAtual = etapa;
      etapaAgenda.classList.toggle('etapa-reserva-ativa', etapa === 'agenda');
      etapaCliente.classList.toggle('etapa-reserva-ativa', etapa === 'cliente');
      btnVoltarEtapaReserva.hidden = etapa === 'agenda';
      acoesReservaFluxo.classList.toggle('tem-voltar', etapa !== 'agenda');
      btnReservaAcao.textContent = etapa === 'agenda' ? 'Continuar' : cpfConsultado ? 'Continuar' : 'Consultar CPF';
      limparMensagemReserva();

      if (etapa === 'cliente') {
        resumoReservaEscolhida.textContent = `${formatarDataBR(dataReserva.value)} as ${horarioReserva.value} - ${qtdPessoasReserva.value} pessoa(s)`;
        cpfReserva.focus();
      }
    }

    function validarAgenda() {
      const data = dataReserva.value;
      const horario = horarioReserva.value;
      const qtdPessoas = Number(qtdPessoasReserva.value);

      if (!data) {
        mostrarMensagemReserva('Escolha uma data para a reserva.');
        return false;
      }

      if (data < hojeISO()) {
        mostrarMensagemReserva('Escolha uma data atual ou futura.');
        return false;
      }

      if (!horario) {
        mostrarMensagemReserva('Escolha um horario para a reserva.');
        return false;
      }

      if (horario < '11:00' || horario > '23:00') {
        mostrarMensagemReserva('Escolha um horario entre 11:00 e 23:00.');
        return false;
      }

      if (!qtdPessoas || qtdPessoas < 1 || qtdPessoas > 20) {
        mostrarMensagemReserva('Informe uma quantidade entre 1 e 20 pessoas.');
        return false;
      }

      return true;
    }

    function salvarAgenda() {
      sessionStorage.setItem('reserva_data', dataReserva.value);
      sessionStorage.setItem('reserva_horario', horarioReserva.value);
      sessionStorage.setItem('reserva_qtd_pessoas', qtdPessoasReserva.value);
    }

    function montarDataHoraReserva(data, horario) {
      return new Date(`${data}T${horario}:00`).toISOString();
    }

    function abrirModalReservaDuplicada() {
      modalReservaDuplicadaTexto.textContent = `Ja existe uma reserva ativa para o CPF informado em ${formatarDataBR(dataReserva.value)} as ${horarioReserva.value}. Escolha outro horario ou revise a reserva existente.`;
      ultimosDigitosTelefoneReserva.value = '';
      mensagemModalReservaDuplicada.textContent = '';
      modalReservaDuplicadaOverlay.classList.add('ativo');
      setTimeout(() => ultimosDigitosTelefoneReserva.focus(), 80);
    }

    function fecharModalReservaDuplicada() {
      modalReservaDuplicadaOverlay.classList.remove('ativo');
    }

    async function buscarReservaDuplicada(cpf, idCliente) {
      let query = supabaseClient
        .from('reserva')
        .select(`
          id,
          status,
          data_hora,
          telefone_cliente,
          cliente:cliente_id (
            telefone
          )
        `)
        .eq('restaurante_id', RESTAURANTE_ID)
        .eq('data_hora', montarDataHoraReserva(dataReserva.value, horarioReserva.value))
        .neq('status', 'Cancelada')
        .limit(1);

      if (idCliente) {
        query = query.or(`cpf_cliente.eq.${cpf},cliente_id.eq.${idCliente}`);
      } else {
        query = query.eq('cpf_cliente', cpf);
      }

      const { data, error } = await query;

      if (error) throw error;

      reservaDuplicadaAtual = data?.[0] || null;

      return Boolean(reservaDuplicadaAtual);
    }

    function validarEdicaoReservaDuplicada() {
      const digitado = somenteNumeros(ultimosDigitosTelefoneReserva.value);
      const telefoneReserva = somenteNumeros(reservaDuplicadaAtual?.telefone_cliente || reservaDuplicadaAtual?.cliente?.telefone || '');
      const ultimosDigitos = telefoneReserva.slice(-4);

      if (!reservaDuplicadaAtual) {
        mensagemModalReservaDuplicada.textContent = 'Nao foi possivel localizar a reserva existente.';
        mensagemModalReservaDuplicada.style.color = 'red';
        return;
      }

      if (digitado.length !== 4 || digitado !== ultimosDigitos) {
        mensagemModalReservaDuplicada.textContent = 'Os 4 ultimos digitos nao conferem.';
        mensagemModalReservaDuplicada.style.color = 'red';
        return;
      }

      sessionStorage.setItem('reserva_id', reservaDuplicadaAtual.id);
      window.location.href = '/pags_html/reagendar_reserva.html';
    }

    function mostrarDadosCliente() {
      dadosClienteReserva.classList.add('ativo');
      nomeReserva.required = true;
      telefoneReserva.required = true;
      emailReserva.required = true;
    }

    async function consultarCPFReserva() {
      const cpfLimpo = somenteNumeros(cpfReserva.value);

      if (!validarCPF(cpfLimpo)) {
        mostrarMensagemReserva('CPF invalido. Verifique o numero informado.');
        return;
      }

      btnReservaAcao.disabled = true;
      btnReservaAcao.textContent = 'Consultando...';

      try {
        const { data, error } = await supabaseClient
          .from('cliente')
          .select('id, nome, telefone, cpf, email')
          .eq('cpf', cpfLimpo)
          .maybeSingle();

        if (error) throw error;

        cpfConsultado = true;
        mostrarDadosCliente();

        if (data) {
          clienteId = data.id;
          nomeReserva.value = data.nome || '';
          telefoneReserva.value = formatarTelefone(data.telefone || '');
          emailReserva.value = data.email || '';
          mostrarMensagemReserva('Cadastro encontrado. Confira os dados antes de continuar.', 'sucesso');
        } else {
          clienteId = null;
          nomeReserva.value = '';
          telefoneReserva.value = '';
          emailReserva.value = '';
          mostrarMensagemReserva('CPF nao localizado. Complete os dados para criar seu cadastro.', 'alerta');
        }

        btnReservaAcao.textContent = 'Continuar';
        nomeReserva.focus();
      } catch (error) {
        console.error('Erro ao consultar CPF:', error);
        mostrarMensagemReserva('Nao foi possivel consultar o CPF no momento.');
      } finally {
        btnReservaAcao.disabled = false;
      }
    }

    async function salvarClienteReserva() {
      const cpfLimpo = somenteNumeros(cpfReserva.value);
      const nome = nomeReserva.value.trim();
      const telefone = telefoneReserva.value.trim();
      const email = emailReserva.value.trim().toLowerCase();

      if (!cpfConsultado) {
        consultarCPFReserva();
        return false;
      }

      if (!validarCPF(cpfLimpo)) {
        mostrarMensagemReserva('CPF invalido.');
        return false;
      }

      if (!nome) {
        mostrarMensagemReserva('Informe o nome.');
        return false;
      }

      if (!validarTelefone(telefone)) {
        mostrarMensagemReserva('Telefone invalido. Informe DDD + numero.');
        return false;
      }

      if (!validarEmail(email)) {
        mostrarMensagemReserva('Informe um email valido para receber a confirmacao.');
        return false;
      }

      btnReservaAcao.disabled = true;

      try {
        const reservaDuplicada = await buscarReservaDuplicada(cpfLimpo, clienteId);

        if (reservaDuplicada) {
          abrirModalReservaDuplicada();
          return false;
        }
      } catch (error) {
        console.error('Erro ao verificar reserva duplicada:', error);
        mostrarMensagemReserva('Nao foi possivel validar reservas existentes no momento.');
        return false;
      } finally {
        btnReservaAcao.disabled = false;
      }

      sessionStorage.setItem('reserva_cliente_id', clienteId || '');
      sessionStorage.setItem('reserva_cpf', cpfLimpo);
      sessionStorage.setItem('reserva_nome', nome);
      sessionStorage.setItem('reserva_telefone', somenteNumeros(telefone));
      sessionStorage.setItem('reserva_email', email);

      return true;
    }

    function carregarReservaSalva() {
      dataReserva.min = hojeISO();
      dataReserva.value = sessionStorage.getItem('reserva_data') || '';
      horarioReserva.value = sessionStorage.getItem('reserva_horario') || '';
      qtdPessoasReserva.value = sessionStorage.getItem('reserva_qtd_pessoas') || 2;

      const cpfSalvo = sessionStorage.getItem('reserva_cpf');
      const nomeSalvo = sessionStorage.getItem('reserva_nome');
      const telefoneSalvo = sessionStorage.getItem('reserva_telefone');
      const emailSalvo = sessionStorage.getItem('reserva_email');
      const clienteIdSalvo = sessionStorage.getItem('reserva_cliente_id');

      if (cpfSalvo || nomeSalvo || telefoneSalvo || emailSalvo) {
        cpfReserva.value = cpfSalvo || '';
        cpfReserva.dispatchEvent(new Event('input'));
        nomeReserva.value = nomeSalvo || '';
        telefoneReserva.value = formatarTelefone(telefoneSalvo || '');
        emailReserva.value = emailSalvo || '';
        clienteId = clienteIdSalvo || null;
        cpfConsultado = Boolean(cpfSalvo);
        mostrarDadosCliente();
      }

      irParaEtapa('agenda');
    }

    cpfReserva.addEventListener('input', function () {
      let valor = somenteNumeros(cpfReserva.value).slice(0, 11);
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      cpfReserva.value = valor;

      cpfConsultado = false;
      clienteId = null;
      dadosClienteReserva.classList.remove('ativo');
      nomeReserva.value = '';
      telefoneReserva.value = '';
      emailReserva.value = '';
      btnReservaAcao.textContent = 'Consultar CPF';
      limparMensagemReserva();
    });

    telefoneReserva.addEventListener('input', function () {
      telefoneReserva.value = formatarTelefone(telefoneReserva.value);
    });

    btnMenosReserva.addEventListener('click', function () {
      alterarQuantidadeReserva(-1);
    });

    btnMaisReserva.addEventListener('click', function () {
      alterarQuantidadeReserva(1);
    });

    btnVoltarEtapaReserva.addEventListener('click', function () {
      irParaEtapa('agenda');
    });

    btnFecharModalReservaDuplicada.addEventListener('click', fecharModalReservaDuplicada);
    btnEntendiReservaDuplicada.addEventListener('click', fecharModalReservaDuplicada);
    btnEditarReservaDuplicada.addEventListener('click', validarEdicaoReservaDuplicada);

    ultimosDigitosTelefoneReserva.addEventListener('input', function () {
      ultimosDigitosTelefoneReserva.value = somenteNumeros(ultimosDigitosTelefoneReserva.value).slice(0, 4);
      mensagemModalReservaDuplicada.textContent = '';
    });

    modalReservaDuplicadaOverlay.addEventListener('click', function (event) {
      if (event.target === modalReservaDuplicadaOverlay) {
        fecharModalReservaDuplicada();
      }
    });

    formReserva.addEventListener('submit', async function (event) {
      event.preventDefault();

      if (etapaAtual === 'agenda') {
        if (!validarAgenda()) return;
        salvarAgenda();
        irParaEtapa('cliente');
        return;
      }

      if (!cpfConsultado) {
        consultarCPFReserva();
        return;
      }

      if (!(await salvarClienteReserva())) return;

      window.location.href = '/pags_html/revisar_reserva.html';
    });

    carregarReservaSalva();
