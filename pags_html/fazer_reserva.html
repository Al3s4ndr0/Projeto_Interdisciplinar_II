<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Fazer reserva</title>
  <link rel="stylesheet" href="../pags_css/fazer_reserva_style.css">
</head>
<body>

  <main class="screen">
    <section class="card">

      <header class="top-image">
        <a href="../pags_html/index.html" class="back-button" aria-label="Voltar">
          &#8592;
        </a>

        <img src="../images/banner_restaurante.png" alt="Imagem do restaurante" class="banner-img">

        <div class="badge-circle">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante">
        </div>
      </header>

      <section class="content">
        <h1>Para quando seria a reserva?</h1>

        <form class="reservation-form">
          <div class="input-icon-group">
            <input type="text" placeholder="Qual a data? *">
            <span class="input-icon">📅</span>
          </div>

          <div class="input-icon-group">
            <input type="text" placeholder="Qual o horário? *">
            <span class="input-icon">🕘</span>
          </div>

          <div class="actions">
            <a href="../pags_html/dados_reserva.html" class="btn btn-success">Continuar</a>
          </div>
        </form>
      </section>
    </section>
  </main>

</body>
</html>
