<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Fazer reserva</title>
  <link rel="stylesheet" href="../pags_css/style.css">
</head>
<body class="tema-reserva">

  <main class="tela">
    <section class="cartao cartao-formulario">

      <section class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="../pags_html/index.html" class="botao-home" aria-label="Ir para início">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <img src="../images/banner_restaurante.png" alt="Imagem do restaurante" class="imagem-restaurante">

        <div class="selo">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante">
        </div>
      </section>

      <section class="conteudo">
        <h1 class="titulo">Para quando seria a reserva?</h1>

        <form class="formulario">
          <input type="text" class="campo" placeholder="Qual a data? *">
          <input type="text" class="campo" placeholder="Qual o horário? *">

          <div class="acoes">
            <a href="../pags_html/dados_reserva.html" class="botao-primario">
              Continuar
            </a>
          </div>
        </form>
      </section>

    </section>
  </main>

</body>
</html>
