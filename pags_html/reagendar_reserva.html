<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Reagendar reserva</title>
  <link rel="stylesheet" href="../pags_css/style.css" />
</head>
<body class="tema-reserva">

  <main class="tela">
    <section class="cartao cartao-formulario cartao-reagendamento">

      <header class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="../pags_html/index.html" class="botao-home" aria-label="Ir para inicio">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <div class="selo">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante" />
        </div>
      </header>

      <section class="conteudo">
        <div class="bloco-identificacao bloco-reserva">
          <h1 class="titulo titulo-centralizado">Reagendar reserva</h1>

          <p class="descricao-fila">
            Atualize data, horario, quantidade de pessoas ou dados de contato da reserva selecionada.
          </p>

          <form class="formulario formulario-identificacao formulario-reserva" id="formReagendarReserva">
            <div class="grupo-campo">
              <label for="dataReagendamento" class="label-campo">Data da reserva</label>
              <input type="date" id="dataReagendamento" class="campo campo-reserva" required />
            </div>

            <div class="grupo-campo">
              <label for="horarioReagendamento" class="label-campo">Horario da reserva</label>
              <input
                type="time"
                id="horarioReagendamento"
                class="campo campo-reserva"
                min="11:00"
                max="23:00"
                step="900"
                required
              />
            </div>

            <div class="grupo-campo">
              <label for="qtdPessoasReagendamento" class="label-campo">Mesa para quantas pessoas?</label>

              <div class="linha-qtd-pessoas">
                <input
                  type="number"
                  id="qtdPessoasReagendamento"
                  class="campo campo-reserva campo-qtd-pessoas"
                  min="1"
                  max="20"
                  required
                />

                <div class="acoes-qtd">
                  <button id="btnMenosReagendamento" class="botao-qtd menos botao-qtd-reserva" type="button" aria-label="Diminuir quantidade"></button>
                  <button id="btnMaisReagendamento" class="botao-qtd mais botao-qtd-reserva" type="button" aria-label="Aumentar quantidade"></button>
                </div>
              </div>
            </div>

            <p class="subtitulo-formulario">Dados da reserva</p>

            <div class="grupo-campo">
              <label for="nomeReagendamento" class="label-campo">Nome</label>
              <input type="text" id="nomeReagendamento" class="campo campo-reserva" required />
            </div>

            <div class="grupo-campo">
              <label for="cpfReagendamento" class="label-campo">CPF</label>
              <input type="text" id="cpfReagendamento" class="campo campo-reserva" readonly />
            </div>

            <div class="grupo-campo">
              <label for="telefoneReagendamento" class="label-campo">Telefone</label>
              <input type="text" id="telefoneReagendamento" class="campo campo-reserva" maxlength="15" required />
            </div>

            <div class="grupo-campo">
              <label for="emailReagendamento" class="label-campo">Email</label>
              <input type="email" id="emailReagendamento" class="campo campo-reserva" required />
            </div>

            <div class="acoes-reserva-fluxo tem-voltar tem-cancelamento">
              <button type="button" class="botao-secundario" onclick="history.back()">
                Voltar
              </button>

              <button type="button" class="botao-secundario botao-cancelar-reagendamento" id="btnCancelarReserva">
                Cancelar reserva
              </button>

              <button type="submit" class="botao-primario" id="btnAtualizarReserva">
                Atualizar
              </button>
            </div>

            <p id="mensagemReagendamento" class="mensagem-formulario"></p>
          </form>
        </div>
      </section>

    </section>
  </main>

  <div class="modal-status-overlay" id="modalCancelamentoReserva">
    <div class="modal-status modal-reserva-duplicada" role="dialog" aria-modal="true" aria-labelledby="modalCancelamentoReservaTitulo">
      <div class="modal-status-header">
        <h2 class="modal-status-titulo" id="modalCancelamentoReservaTitulo">Cancelar reserva</h2>
        <button class="modal-status-fechar" id="btnFecharModalCancelamentoReserva" type="button" aria-label="Fechar modal">&times;</button>
      </div>

      <div class="modal-status-body">
        <p class="modal-status-texto">
          Voce quer mesmo cancelar esta reserva?
        </p>

        <div class="modal-status-acoes">
          <button type="button" class="botao-secundario" id="btnManterReserva">
            Nao, manter reserva
          </button>

          <button type="button" class="botao-primario" id="btnConfirmarCancelamentoReserva">
            Sim, cancelar
          </button>
        </div>

        <p id="mensagemCancelamentoReserva" class="modal-fila-mensagem"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://jlfbzdqhaezdtyyajqlk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA'
    );

    const RESTAURANTE_ID = '00000000-0000-0000-0000-000000000001';
    const RESTAURANTE_NOME = 'Mangálhos Grill';
    const LINK_CONSULTA_RESERVAS = `${window.location.origin}${window.location.pathname.replace('reagendar_reserva.html', 'consultar_reservas.html')}`;
    const EMAILJS_CONFIG = {
      publicKey: '1AI1-s7z0WFVbln51',
      serviceId: 'service_tz8g5dg',
      templateMovimentacaoId: 'template_7rbmg7s'
    };

    const formReagendarReserva = document.getElementById('formReagendarReserva');
    const dataReagendamento = document.getElementById('dataReagendamento');
    const horarioReagendamento = document.getElementById('horarioReagendamento');
    const qtdPessoasReagendamento = document.getElementById('qtdPessoasReagendamento');
    const nomeReagendamento = document.getElementById('nomeReagendamento');
    const cpfReagendamento = document.getElementById('cpfReagendamento');
    const telefoneReagendamento = document.getElementById('telefoneReagendamento');
    const emailReagendamento = document.getElementById('emailReagendamento');
    const btnMenosReagendamento = document.getElementById('btnMenosReagendamento');
    const btnMaisReagendamento = document.getElementById('btnMaisReagendamento');
    const btnAtualizarReserva = document.getElementById('btnAtualizarReserva');
    const btnCancelarReserva = document.getElementById('btnCancelarReserva');
    const modalCancelamentoReserva = document.getElementById('modalCancelamentoReserva');
    const btnFecharModalCancelamentoReserva = document.getElementById('btnFecharModalCancelamentoReserva');
    const btnManterReserva = document.getElementById('btnManterReserva');
    const btnConfirmarCancelamentoReserva = document.getElementById('btnConfirmarCancelamentoReserva');
    const mensagemCancelamentoReserva = document.getElementById('mensagemCancelamentoReserva');
    const mensagemReagendamento = document.getElementById('mensagemReagendamento');

    let reservaAtual = null;

    function somenteNumeros(valor) {
      return String(valor || '').replace(/\D/g, '');
    }

    function hojeISO() {
      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = String(hoje.getMonth() + 1).padStart(2, '0');
      const dia = String(hoje.getDate()).padStart(2, '0');
      return `${ano}-${mes}-${dia}`;
    }

    function formatarCPF(cpf) {
      let valor = somenteNumeros(cpf).slice(0, 11);
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      return valor;
    }

    function formatarDataBR(dataISO) {
      if (!dataISO) return '';
      const [ano, mes, dia] = dataISO.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    function formatarTelefone(valor) {
      let numeros = somenteNumeros(valor).slice(0, 11);

      if (numeros.length <= 10) {
        numeros = numeros.replace(/(\d{2})(\d)/, '($1) $2');
        numeros = numeros.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        numeros = numeros.replace(/(\d{2})(\d)/, '($1) $2');
        numeros = numeros.replace(/(\d{5})(\d)/, '$1-$2');
      }

      return numeros;
    }

    function validarEmail(valor) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(valor || '').trim());
    }

    function emailJSConfigurado(templateId) {
      return Boolean(
        window.emailjs &&
        EMAILJS_CONFIG.publicKey &&
        EMAILJS_CONFIG.serviceId &&
        templateId &&
        !EMAILJS_CONFIG.publicKey.includes('COLE_') &&
        !EMAILJS_CONFIG.serviceId.includes('COLE_') &&
        !templateId.includes('COLE_')
      );
    }

    function inicializarEmailJS(templateId) {
      if (!emailJSConfigurado(templateId)) return false;

      emailjs.init({
        publicKey: EMAILJS_CONFIG.publicKey
      });

      return true;
    }

    function montarParametrosEmailReserva(reserva) {
      const emailDestino = String(reserva.email || '').trim().toLowerCase();

      if (!validarEmail(emailDestino)) {
        throw new Error('Email de destino invalido para envio da reserva.');
      }

      return {
        email: emailDestino,
        to_email: emailDestino,
        recipient: emailDestino,
        reply_to: emailDestino,
        user_email: emailDestino,
        to_name: reserva.nome,
        nome_cliente: reserva.nome,
        email_cliente: emailDestino,
        cpf_cliente: formatarCPF(reserva.cpf),
        telefone_cliente: formatarTelefone(reserva.telefone),
        restaurante_nome: RESTAURANTE_NOME,
        data_reserva: formatarDataBR(reserva.data),
        horario_reserva: reserva.horario,
        qtd_pessoas: `${reserva.qtdPessoas} pessoa(s)`,
        reserva_id: reserva.id,
        link_reserva: LINK_CONSULTA_RESERVAS,
        tipo_movimentacao: reserva.tipoMovimentacao || 'Reserva atualizada',
        titulo_movimentacao: reserva.tituloMovimentacao || 'Reserva atualizada',
        mensagem_movimentacao: reserva.mensagemMovimentacao || 'Sua reserva foi atualizada com sucesso.',
        cor_movimentacao: reserva.corMovimentacao || '#407C5A',
        cta_movimentacao: reserva.ctaMovimentacao || 'Consultar ou ajustar reserva',
        rodape_movimentacao: reserva.rodapeMovimentacao || 'Obrigado por usar o Qmesa. Esperamos voce no horario reservado.',
        dados_anteriores_texto: reserva.dadosAnterioresTexto || '',
        data_reserva_anterior: reserva.dataAnterior ? formatarDataBR(reserva.dataAnterior) : '',
        horario_reserva_anterior: reserva.horarioAnterior || '',
        qtd_pessoas_anterior: reserva.qtdPessoasAnterior ? `${reserva.qtdPessoasAnterior} pessoa(s)` : ''
      };
    }

    async function enviarEmailReserva(templateId, reserva, contexto) {
      if (!inicializarEmailJS(templateId)) {
        console.info(`EmailJS ainda nao configurado para ${contexto}. Email nao enviado.`);
        return false;
      }

      await emailjs.send(
        EMAILJS_CONFIG.serviceId,
        templateId,
        montarParametrosEmailReserva(reserva)
      );

      return true;
    }

    function montarDataHoraReserva(data, horario) {
      return new Date(`${data}T${horario}:00`).toISOString();
    }

    function separarDataHora(dataHora) {
      const data = new Date(dataHora);
      const ano = data.getFullYear();
      const mes = String(data.getMonth() + 1).padStart(2, '0');
      const dia = String(data.getDate()).padStart(2, '0');
      const hora = String(data.getHours()).padStart(2, '0');
      const minuto = String(data.getMinutes()).padStart(2, '0');

      return {
        data: `${ano}-${mes}-${dia}`,
        horario: `${hora}:${minuto}`
      };
    }

    function mostrarMensagem(texto, tipo = 'erro') {
      mensagemReagendamento.textContent = texto;
      mensagemReagendamento.style.color = tipo === 'sucesso' ? 'green' : 'red';
    }

    function alterarQuantidade(delta) {
      const valorAtual = Number(qtdPessoasReagendamento.value) || 1;
      qtdPessoasReagendamento.value = Math.min(20, Math.max(1, valorAtual + delta));
    }

    function abrirModalCancelamentoReserva() {
      mensagemCancelamentoReserva.textContent = '';
      modalCancelamentoReserva.classList.add('ativo');
    }

    function fecharModalCancelamentoReserva() {
      modalCancelamentoReserva.classList.remove('ativo');
    }

    async function confirmarCancelamentoReserva() {
      const reservaId = reservaAtual?.id || sessionStorage.getItem('reserva_id');

      if (!reservaId) {
        mensagemCancelamentoReserva.textContent = 'Nao foi possivel identificar a reserva.';
        mensagemCancelamentoReserva.style.color = 'red';
        return;
      }

      btnConfirmarCancelamentoReserva.disabled = true;
      btnConfirmarCancelamentoReserva.textContent = 'Cancelando...';

      try {
        const { error } = await supabaseClient
          .from('reserva')
          .update({ status: 'Cancelada' })
          .eq('id', reservaId);

        if (error) throw error;

        if (reservaAtual) {
          const partes = separarDataHora(reservaAtual.data_hora);

          try {
            await enviarEmailReserva(
              EMAILJS_CONFIG.templateMovimentacaoId,
              {
                id: reservaId,
                nome: reservaAtual.nome_cliente || reservaAtual.cliente?.nome || '',
                cpf: reservaAtual.cpf_cliente || reservaAtual.cliente?.cpf || '',
                telefone: reservaAtual.telefone_cliente || reservaAtual.cliente?.telefone || '',
                email: reservaAtual.email_cliente || reservaAtual.cliente?.email || '',
                data: partes.data,
                horario: partes.horario,
                qtdPessoas: reservaAtual.num_pessoas,
                tipoMovimentacao: 'Reserva cancelada',
                tituloMovimentacao: 'Reserva cancelada',
                mensagemMovimentacao: 'Sua reserva foi cancelada.',
                corMovimentacao: '#6b7280',
                ctaMovimentacao: 'Consultar minhas reservas',
                rodapeMovimentacao: 'Tudo certo por aqui. Quando quiser, voce pode fazer uma nova reserva pelo Qmesa.',
                dadosAnterioresTexto: ''
              },
              'cancelamento de reserva'
            );
          } catch (erroEmail) {
            console.warn('Reserva cancelada, mas o email de cancelamento nao foi enviado:', erroEmail);
          }
        }

        sessionStorage.setItem('reserva_cancelada_id', reservaId);
        if (reservaAtual?.cliente_id) {
          sessionStorage.setItem('reserva_cancelada_cliente_id', reservaAtual.cliente_id);
        }

        window.location.href = '../pags_html/cancelamento_reserva_confirmado.html';
      } catch (error) {
        console.error('Erro ao cancelar reserva:', error);
        mensagemCancelamentoReserva.textContent = 'Nao foi possivel cancelar a reserva no momento.';
        mensagemCancelamentoReserva.style.color = 'red';
        btnConfirmarCancelamentoReserva.disabled = false;
        btnConfirmarCancelamentoReserva.textContent = 'Sim, cancelar';
      }
    }

    async function carregarReserva() {
      const reservaId = sessionStorage.getItem('reserva_id');
      dataReagendamento.min = hojeISO();

      if (!reservaId) {
        mostrarMensagem('Nao foi possivel identificar a reserva para reagendamento.');
        btnAtualizarReserva.disabled = true;
        return;
      }

      const { data, error } = await supabaseClient
        .from('reserva')
        .select(`
          id,
          cliente_id,
          restaurante_id,
          data_hora,
          num_pessoas,
          status,
          nome_cliente,
          cpf_cliente,
          telefone_cliente,
          email_cliente,
          cliente:cliente_id (
            nome,
            cpf,
            telefone,
            email
          )
        `)
        .eq('id', reservaId)
        .maybeSingle();

      if (error || !data) {
        console.error('Erro ao carregar reserva:', error);
        mostrarMensagem('Nao foi possivel carregar a reserva.');
        btnAtualizarReserva.disabled = true;
        return;
      }

      reservaAtual = data;
      const partes = separarDataHora(data.data_hora);

      dataReagendamento.value = partes.data;
      horarioReagendamento.value = partes.horario;
      qtdPessoasReagendamento.value = data.num_pessoas || 2;
      nomeReagendamento.value = data.nome_cliente || data.cliente?.nome || '';
      cpfReagendamento.value = formatarCPF(data.cpf_cliente || data.cliente?.cpf || '');
      telefoneReagendamento.value = formatarTelefone(data.telefone_cliente || data.cliente?.telefone || '');
      emailReagendamento.value = data.email_cliente || data.cliente?.email || '';
    }

    async function existeReservaNoNovoHorario(cpf, clienteId, data, horario) {
      const { data: reservas, error } = await supabaseClient
        .from('reserva')
        .select('id')
        .eq('restaurante_id', RESTAURANTE_ID)
        .eq('data_hora', montarDataHoraReserva(data, horario))
        .neq('status', 'Cancelada')
        .neq('id', reservaAtual.id)
        .or(`cpf_cliente.eq.${cpf},cliente_id.eq.${clienteId}`)
        .limit(1);

      if (error) throw error;

      return Boolean(reservas && reservas.length);
    }

    telefoneReagendamento.addEventListener('input', function () {
      telefoneReagendamento.value = formatarTelefone(telefoneReagendamento.value);
    });

    btnMenosReagendamento.addEventListener('click', function () {
      alterarQuantidade(-1);
    });

    btnMaisReagendamento.addEventListener('click', function () {
      alterarQuantidade(1);
    });

    btnCancelarReserva.addEventListener('click', abrirModalCancelamentoReserva);
    btnFecharModalCancelamentoReserva.addEventListener('click', fecharModalCancelamentoReserva);
    btnManterReserva.addEventListener('click', fecharModalCancelamentoReserva);
    btnConfirmarCancelamentoReserva.addEventListener('click', confirmarCancelamentoReserva);

    modalCancelamentoReserva.addEventListener('click', function (event) {
      if (event.target === modalCancelamentoReserva) {
        fecharModalCancelamentoReserva();
      }
    });

    formReagendarReserva.addEventListener('submit', async function (event) {
      event.preventDefault();

      if (!reservaAtual) return;

      const data = dataReagendamento.value;
      const horario = horarioReagendamento.value;
      const qtdPessoas = Number(qtdPessoasReagendamento.value);
      const nome = nomeReagendamento.value.trim();
      const cpf = somenteNumeros(cpfReagendamento.value || reservaAtual.cpf_cliente || reservaAtual.cliente?.cpf);
      const telefone = somenteNumeros(telefoneReagendamento.value);
      const email = emailReagendamento.value.trim().toLowerCase();

      if (!data || data < hojeISO()) {
        mostrarMensagem('Escolha uma data atual ou futura.');
        return;
      }

      if (!horario || horario < '11:00' || horario > '23:00') {
        mostrarMensagem('Escolha um horario entre 11:00 e 23:00.');
        return;
      }

      if (!qtdPessoas || qtdPessoas < 1 || qtdPessoas > 20) {
        mostrarMensagem('Informe uma quantidade entre 1 e 20 pessoas.');
        return;
      }

      if (!nome || telefone.length < 10) {
        mostrarMensagem('Confira nome e telefone.');
        return;
      }

      if (!validarEmail(email)) {
        mostrarMensagem('Informe um email valido para receber a confirmacao.');
        return;
      }

      btnAtualizarReserva.disabled = true;
      btnAtualizarReserva.textContent = 'Atualizando...';
      mensagemReagendamento.textContent = '';

      try {
        const reservaAnterior = {
          data: separarDataHora(reservaAtual.data_hora).data,
          horario: separarDataHora(reservaAtual.data_hora).horario,
          qtdPessoas: reservaAtual.num_pessoas
        };
        const duplicada = await existeReservaNoNovoHorario(cpf, reservaAtual.cliente_id, data, horario);

        if (duplicada) {
          mostrarMensagem('Ja existe outra reserva ativa para este CPF nesta data e horario.');
          btnAtualizarReserva.disabled = false;
          btnAtualizarReserva.textContent = 'Atualizar';
          return;
        }

        const { error: erroReserva } = await supabaseClient
          .from('reserva')
          .update({
            data_hora: montarDataHoraReserva(data, horario),
            num_pessoas: qtdPessoas,
            nome_cliente: nome,
            cpf_cliente: cpf,
            telefone_cliente: telefone,
            email_cliente: email
          })
          .eq('id', reservaAtual.id);

        if (erroReserva) throw erroReserva;

        const { error: erroCliente } = await supabaseClient
          .from('cliente')
          .update({ nome, telefone, cpf, email })
          .eq('id', reservaAtual.cliente_id);

        if (erroCliente) throw erroCliente;

        sessionStorage.setItem('reserva_data', data);
        sessionStorage.setItem('reserva_horario', horario);
        sessionStorage.setItem('reserva_qtd_pessoas', qtdPessoas);
        sessionStorage.setItem('reserva_nome', nome);
        sessionStorage.setItem('reserva_cpf', cpf);
        sessionStorage.setItem('reserva_telefone', telefone);
        sessionStorage.setItem('reserva_email', email);
        sessionStorage.setItem('reserva_cliente_id', reservaAtual.cliente_id);

        try {
          await enviarEmailReserva(
            EMAILJS_CONFIG.templateMovimentacaoId,
            {
              id: reservaAtual.id,
              nome,
              cpf,
              telefone,
              email,
              data,
              horario,
              qtdPessoas,
              dataAnterior: reservaAnterior.data,
              horarioAnterior: reservaAnterior.horario,
              qtdPessoasAnterior: reservaAnterior.qtdPessoas,
              tipoMovimentacao: 'Reserva atualizada',
              tituloMovimentacao: 'Reserva atualizada',
              mensagemMovimentacao: 'Sua reserva foi atualizada com sucesso.',
              corMovimentacao: '#407C5A',
              ctaMovimentacao: 'Consultar ou ajustar reserva',
              rodapeMovimentacao: 'Obrigado por usar o Qmesa. Esperamos voce no horario reservado.',
              dadosAnterioresTexto: `Antes: ${formatarDataBR(reservaAnterior.data)} as ${reservaAnterior.horario} - ${reservaAnterior.qtdPessoas} pessoa(s)`
            },
            'atualizacao de reserva'
          );
        } catch (erroEmail) {
          console.warn('Reserva atualizada, mas o email de atualizacao nao foi enviado:', erroEmail);
        }

        window.location.href = '../pags_html/reagendamento_confirmado.html';
      } catch (error) {
        console.error('Erro ao reagendar reserva:', error);
        mostrarMensagem('Nao foi possivel atualizar a reserva no momento.');
        btnAtualizarReserva.disabled = false;
        btnAtualizarReserva.textContent = 'Atualizar';
      }
    });

    carregarReserva();
  </script>
</body>
</html>
