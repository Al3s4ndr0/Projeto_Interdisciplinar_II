<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Cancelar reserva</title>
  <link rel="stylesheet" href="../pags_css/style.css">
</head>
<body class="tema-cancelamento">

  <main class="tela">
    <section class="cartao cartao-cancelamento-futuro">

      <header class="painel-agradecimento">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="../pags_html/index.html" class="botao-home" aria-label="Ir para início">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <div class="marca-agradecimento">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante" class="logo-agradecimento">
        </div>
      </header>

      <section class="conteudo">
        <h1 class="titulo-cancelamento-futuro">Você nem chegou e já quer<br>ir embora?</h1>

        <div class="ilustracao-acompanhamento ilustracao-cancelamento-futuro">
          <img src="../images/reserva_futura_cancelada.png" alt="Cancelar reserva futura">
        </div>

        <p class="descricao-cancelamento-futuro">
          Você quer mesmo cancelar<br>
          a sua reserva?
        </p>

        <div class="acoes-acompanhamento acoes-cancelamento-futuro">
          <button type="button" class="botao-primario botao-voltar-reserva" onclick="history.back()">
            Não, eu posso aguardar
          </button>

          <a href="../pags_html/cancelamento_reserva_confirmado.html" class="botao-secundario botao-confirmar-cancelamento">
            Sim, eu quero cancelar
          </a>
        </div>
      </section>

    </section>
  </main>

</body>
</html>
