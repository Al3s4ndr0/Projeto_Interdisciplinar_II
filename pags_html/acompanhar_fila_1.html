<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Acompanhar fila</title>
  <link rel="stylesheet" href="../pags_css/acompanhar_fila_1_style.css" />
</head>
<body>
  <main class="screen">
    <section class="card">

      <header class="brand">
        <a href="fila_confirmada.html" class="back-button" aria-label="Voltar">
          &#8592;
        </a>

        <div class="brand-logo">
          <img src="../images/logo_restaurante.png" class="logo" alt="Logo do restaurante" />
        </div>
      </header>

      <section class="content">
        <h1>Estamos esperando os clientes atuais finalizarem</h1>

        <p class="subtitle">Aproveite para olhar o Cardápio</p>

        <div class="progress-wrapper">
          <div class="progress-bar">
            <div class="progress-fill"></div>
            <div class="progress-badge">2</div>
          </div>
        </div>

        <div class="illustration">
          <img src="../images/mesa_ocupada.png" alt="Ilustração de clientes na mesa" />
        </div>

        <p class="eta-text">Tempo Médio: 10 minutos</p>

        <div class="actions">
          <a href="cardapio.html" class="btn btn-primary">Visitar restaurante</a>
          <a href="cancelar_reserva.html" class="btn btn-light">Cancelar reserva</a>
          <a href="acompanhar_fila_2.html" class="btn btn-light">TESTE</a>
        </div>
      </section>

    </section>
  </main>
</body>
</html>
