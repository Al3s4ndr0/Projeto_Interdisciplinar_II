<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Comentário enviado</title>
  <link rel="stylesheet" href="../pags_css/comentario_cancelamento_enviado_style.css">
</head>
<body>

  <main class="screen">
    <section class="card">

      <header class="hero">
        <a href="javascript:history.back()" class="back-button" aria-label="Voltar">
          &#8592;
        </a>

        <div class="badge-circle">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante">
        </div>
      </header>

      <section class="content">
        <h1>Obrigado pelo seu<br>retorno!</h1>

        <p class="subtitle">
          Seu comentário ajuda a melhorar nossa

          <img src="../images/coracao_solidario.png" alt="Comentário enviado com sucesso">
        </div>

        <p class="message">
          Esperamos poder conseguir uma<br>
          segunda chance de te atender em breve.<br>
          Boa Viagem!
        </p>

        <div class="actions">
          <a href="../pags_html/index.html" class="btn btn-success">Voltar a Tela Inicial</a>

      <footer class="footer-nav"></footer>
