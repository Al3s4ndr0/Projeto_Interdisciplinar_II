<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Revisao da reserva</title>
  <link rel="stylesheet" href="/pags_css/style.css" />
</head>
<body class="tema-reserva">

  <main class="tela">
    <section class="cartao cartao-formulario">

      <section class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="/pags_html/index.html" class="botao-home" aria-label="Ir para inicio">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <img src="/images/banner_restaurante.png" alt="Imagem do restaurante" class="imagem-restaurante" />

        <div class="selo">
          <img src="/images/logo_restaurante.png" alt="Logo do restaurante" />
        </div>
      </section>

      <section class="conteudo">
        <div class="bloco-identificacao">
          <h1 class="titulo titulo-centralizado">Revise seus dados antes de efetuar a reserva</h1>

          <div class="formulario formulario-identificacao">
            <label class="grupo-campo">
              <span class="label-campo">Data e horario</span>
              <input type="text" class="campo campo-reserva" id="revDataHorario" readonly />
            </label>

            <label class="grupo-campo">
              <span class="label-campo">Nome</span>
              <input type="text" class="campo campo-reserva" id="revNome" readonly />
            </label>

            <label class="grupo-campo">
              <span class="label-campo">CPF</span>
              <input type="text" class="campo campo-reserva" id="revCpf" readonly />
            </label>

            <label class="grupo-campo">
              <span class="label-campo">Telefone</span>
              <input type="text" class="campo campo-reserva" id="revTelefone" readonly />
            </label>

            <label class="grupo-campo">
              <span class="label-campo">Email</span>
              <input type="text" class="campo campo-reserva" id="revEmail" readonly />
            </label>

            <label class="grupo-campo">
              <span class="label-campo">Quantidade de pessoas</span>
              <input type="text" class="campo campo-reserva" id="revQtdPessoas" readonly />
            </label>
          </div>

          <div class="acoes acoes-reserva-fluxo">
            <button class="botao-secundario" type="button" onclick="history.back()">
              Revisar dados
            </button>

            <button type="button" class="botao-primario" id="btnConfirmarReserva">
              Confirmar reserva
            </button>
          </div>

          <p id="mensagemRevisaoReserva" class="mensagem-formulario"></p>
        </div>
      </section>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://jlfbzdqhaezdtyyajqlk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA'
    );

    const RESTAURANTE_ID = '00000000-0000-0000-0000-000000000001';
    const RESTAURANTE_NOME = 'MangÃ¡lhos Grill';
    const LINK_CONSULTA_RESERVAS = `${window.location.origin}${window.location.pathname.replace('revisar_reserva.html', 'consultar_reservas.html')}`;
    const EMAILJS_CONFIG = {
      publicKey: '1AI1-s7z0WFVbln51',
      serviceId: 'service_tz8g5dg',
      templateId: 'template_txotkgm'
    };

    const revDataHorario = document.getElementById('revDataHorario');
    const revNome = document.getElementById('revNome');
    const revCpf = document.getElementById('revCpf');
    const revTelefone = document.getElementById('revTelefone');
    const revEmail = document.getElementById('revEmail');
    const revQtdPessoas = document.getElementById('revQtdPessoas');
    const btnConfirmarReserva = document.getElementById('btnConfirmarReserva');
    const mensagemRevisaoReserva = document.getElementById('mensagemRevisaoReserva');

    function somenteNumeros(valor) {
      return String(valor || '').replace(/\D/g, '');
    }

    function formatarDataBR(dataISO) {
      if (!dataISO) return '';
      const [ano, mes, dia] = dataISO.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    function formatarCPF(cpf) {
      let valor = somenteNumeros(cpf).slice(0, 11);
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      return valor;
    }

    function formatarTelefone(telefone) {
      let valor = somenteNumeros(telefone).slice(0, 11);

      if (valor.length <= 10) {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
      }

      return valor;
    }

    function validarEmail(valor) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(valor || '').trim());
    }

    function emailJSConfigurado() {
      return Boolean(
        window.emailjs &&
        EMAILJS_CONFIG.publicKey &&
        EMAILJS_CONFIG.serviceId &&
        EMAILJS_CONFIG.templateId &&
        !EMAILJS_CONFIG.publicKey.includes('COLE_') &&
        !EMAILJS_CONFIG.serviceId.includes('COLE_') &&
        !EMAILJS_CONFIG.templateId.includes('COLE_')
      );
    }

    function inicializarEmailJS() {
      if (!emailJSConfigurado()) return false;

      emailjs.init({
        publicKey: EMAILJS_CONFIG.publicKey
      });

      return true;
    }

    async function enviarEmailConfirmacaoReserva(reserva) {
      if (!inicializarEmailJS()) {
        console.info('EmailJS ainda nao configurado. Email de confirmacao nao enviado.');
        return false;
      }

      const emailDestino = String(reserva.email || '').trim().toLowerCase();

      if (!validarEmail(emailDestino)) {
        throw new Error('Email de destino invalido para envio da confirmacao.');
      }

      const parametros = {
        email: emailDestino,
        to_email: emailDestino,
        recipient: emailDestino,
        reply_to: emailDestino,
        user_email: emailDestino,
        to_name: reserva.nome,
        nome_cliente: reserva.nome,
        email_cliente: emailDestino,
        cpf_cliente: formatarCPF(reserva.cpf),
        telefone_cliente: formatarTelefone(reserva.telefone),
        restaurante_nome: RESTAURANTE_NOME,
        data_reserva: formatarDataBR(reserva.data),
        horario_reserva: reserva.horario,
        qtd_pessoas: `${reserva.qtdPessoas} pessoa(s)`,
        reserva_id: reserva.id,
        link_reserva: LINK_CONSULTA_RESERVAS
      };

      await emailjs.send(
        EMAILJS_CONFIG.serviceId,
        EMAILJS_CONFIG.templateId,
        parametros
      );

      return true;
    }

    function carregarRevisaoReserva() {
      const data = sessionStorage.getItem('reserva_data');
      const horario = sessionStorage.getItem('reserva_horario');
      const qtdPessoas = sessionStorage.getItem('reserva_qtd_pessoas');
      const nome = sessionStorage.getItem('reserva_nome');
      const cpf = sessionStorage.getItem('reserva_cpf');
      const telefone = sessionStorage.getItem('reserva_telefone');
      const email = sessionStorage.getItem('reserva_email');

      if (!data || !horario || !qtdPessoas || !nome || !cpf || !telefone || !email) {
        mensagemRevisaoReserva.textContent = 'Dados da reserva incompletos. Volte e preencha novamente.';
        mensagemRevisaoReserva.style.color = 'red';
        return;
      }

      revDataHorario.value = `${formatarDataBR(data)} as ${horario}`;
      revNome.value = nome;
      revCpf.value = formatarCPF(cpf);
      revTelefone.value = formatarTelefone(telefone);
      revEmail.value = email;
      revQtdPessoas.value = `${qtdPessoas} pessoa(s)`;
    }

    async function obterOuSalvarCliente(nome, cpf, telefone, email) {
      const clienteIdSalvo = sessionStorage.getItem('reserva_cliente_id');

      if (clienteIdSalvo) {
        const { error } = await supabaseClient
          .from('cliente')
          .update({ nome, cpf, telefone, email })
          .eq('id', clienteIdSalvo);

        if (error) throw error;
        return clienteIdSalvo;
      }

      const { data: clienteExistente, error: erroBusca } = await supabaseClient
        .from('cliente')
        .select('id')
        .eq('cpf', cpf)
        .maybeSingle();

      if (erroBusca) throw erroBusca;

      if (clienteExistente) {
        const { error: erroAtualizacao } = await supabaseClient
          .from('cliente')
          .update({ nome, cpf, telefone, email })
          .eq('id', clienteExistente.id);

        if (erroAtualizacao) throw erroAtualizacao;
        return clienteExistente.id;
      }

      const { data: clienteInserido, error: erroInsercao } = await supabaseClient
        .from('cliente')
        .insert([{ nome, cpf, telefone, email }])
        .select('id')
        .single();

      if (erroInsercao) throw erroInsercao;
      return clienteInserido.id;
    }

    function montarDataHoraReserva(data, horario) {
      return new Date(`${data}T${horario}:00`).toISOString();
    }

    async function buscarReservaDuplicada(cpf, clienteId, data, horario) {
      const { data: reservas, error } = await supabaseClient
        .from('reserva')
        .select('id')
        .eq('restaurante_id', RESTAURANTE_ID)
        .eq('data_hora', montarDataHoraReserva(data, horario))
        .neq('status', 'Cancelada')
        .or(`cpf_cliente.eq.${cpf},cliente_id.eq.${clienteId}`)
        .limit(1);

      if (error) throw error;

      return Boolean(reservas && reservas.length);
    }

    btnConfirmarReserva.addEventListener('click', async function () {
      const data = sessionStorage.getItem('reserva_data');
      const horario = sessionStorage.getItem('reserva_horario');
      const qtdPessoas = Number(sessionStorage.getItem('reserva_qtd_pessoas'));
      const nome = sessionStorage.getItem('reserva_nome');
      const cpf = somenteNumeros(sessionStorage.getItem('reserva_cpf'));
      const telefone = somenteNumeros(sessionStorage.getItem('reserva_telefone'));
      const email = String(sessionStorage.getItem('reserva_email') || '').trim().toLowerCase();

      if (!data || !horario || !qtdPessoas || !nome || !cpf || !telefone || !validarEmail(email)) {
        mensagemRevisaoReserva.textContent = 'Dados da reserva incompletos. Volte e preencha novamente.';
        mensagemRevisaoReserva.style.color = 'red';
        return;
      }

      btnConfirmarReserva.disabled = true;
      btnConfirmarReserva.textContent = 'Confirmando...';
      mensagemRevisaoReserva.textContent = '';

      try {
        const clienteId = await obterOuSalvarCliente(nome, cpf, telefone, email);
        const reservaDuplicada = await buscarReservaDuplicada(cpf, clienteId, data, horario);

        if (reservaDuplicada) {
          mensagemRevisaoReserva.textContent = 'Ja existe uma reserva ativa para este CPF nesta data e horario.';
          mensagemRevisaoReserva.style.color = 'red';
          btnConfirmarReserva.disabled = false;
          btnConfirmarReserva.textContent = 'Confirmar reserva';
          return;
        }

        const { data: reservaInserida, error: erroReserva } = await supabaseClient
          .from('reserva')
          .insert([
            {
              cliente_id: clienteId,
              restaurante_id: RESTAURANTE_ID,
              data_hora: montarDataHoraReserva(data, horario),
              num_pessoas: qtdPessoas,
              nome_cliente: nome,
              cpf_cliente: cpf,
              telefone_cliente: telefone,
              email_cliente: email,
              status: 'Pendente'
            }
          ])
          .select('id')
          .single();

        if (erroReserva) throw erroReserva;

        sessionStorage.setItem('reserva_id', reservaInserida.id);
        sessionStorage.setItem('reserva_cliente_id', clienteId);
        sessionStorage.setItem('reserva_email', email);

        try {
          await enviarEmailConfirmacaoReserva({
            id: reservaInserida.id,
            nome,
            cpf,
            telefone,
            email,
            data,
            horario,
            qtdPessoas
          });
        } catch (erroEmail) {
          console.warn('Reserva criada, mas o email de confirmacao nao foi enviado:', erroEmail);
        }

        window.location.href = '/pags_html/reserva_confirmada.html';
      } catch (error) {
        console.error('Erro ao confirmar reserva:', error);
        mensagemRevisaoReserva.textContent = 'Nao foi possivel confirmar sua reserva no momento. Tente novamente.';
        mensagemRevisaoReserva.style.color = 'red';
        btnConfirmarReserva.disabled = false;
        btnConfirmarReserva.textContent = 'Confirmar reserva';
      }
    });

    carregarRevisaoReserva();
  </script>
</body>
</html>
