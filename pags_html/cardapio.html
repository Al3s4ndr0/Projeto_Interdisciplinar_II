<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Cardapio</title>
  <link rel="stylesheet" href="../pags_css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../pags_js/config-loader.js"></script>
</head>
<body class="tema-fila">
  <main class="tela">
    <section class="cartao cartao-formulario cartao-cardapio">
      <section class="painel-imagem">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="../pags_html/index.html" class="botao-home" aria-label="Ir para a tela inicial">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>

        <img src="../images/banner_restaurante.png" alt="Imagem do restaurante" class="imagem-restaurante" />

        <div class="selo">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante" />
        </div>
      </section>

      <section class="conteudo">
        <h1 class="titulo">MENU</h1>

        <div class="abas-cardapio-area">
          <nav class="abas-cardapio" id="abasCardapio"></nav>
        </div>

        <section class="grade-cardapio" id="gradeCardapio"></section>
        <p class="descricao-item" id="mensagemCardapio" style="margin-top: 16px; display: none;"></p>
      </section>

      <script src="../pags_js/cardapio.js"></script>
    </section>
  </main>
</body>
</html>
