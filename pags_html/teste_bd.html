<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CRUD Restaurante + Clientes + Fila</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    input {
      margin: 5px;
      padding: 5px;
    }

    button {
      margin: 5px;
      padding: 5px 10px;
      cursor: pointer;
    }

    table {
      margin-top: 20px;
      margin-bottom: 30px;
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #eee;
    }

    hr {
      margin: 30px 0;
    }
  </style>
</head>
<body>

  <h1>🍽️ CRUD Restaurante</h1>

  <input type="text" id="nome" placeholder="Nome">
  <input type="number" id="capacidade" placeholder="Capacidade">
  <input type="text" id="horario" placeholder="Horário">

  <button onclick="inserir()">Salvar</button>
  <button onclick="atualizar()" id="btnUpdate" style="display:none;">Atualizar</button>

  <hr>

  <button onclick="buscar()">🔄 Atualizar Lista de Restaurantes</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Capacidade</th>
        <th>Horário</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <hr>

  <h2>👤 Clientes</h2>

  <button onclick="buscarClientes()">🔄 Atualizar Lista de Clientes</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>CPF</th>
        <th>Telefone</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaClientes"></tbody>
  </table>

  <hr>

  <h2>📋 Fila de Espera</h2>

  <button onclick="buscarFila()">🔄 Atualizar Fila</button>

  <table>
    <thead>
      <tr>
        <th>ID Fila</th>
        <th>Cliente</th>
        <th>CPF</th>
        <th>Telefone</th>
        <th>Restaurante</th>
        <th>Nº Pessoas</th>
        <th>Posição</th>
        <th>Status</th>
        <th>Tempo Estimado</th>
        <th>Hora Entrada</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaFila"></tbody>
  </table>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = 'https://jlfbzdqhaezdtyyajqlk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA';

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let idEditando = null;

    async function buscar() {
      const { data, error } = await supabaseClient
        .from('restaurante')
        .select('*');

      if (error) {
        alert('Erro ao buscar restaurantes: ' + error.message);
        return;
      }

      const tabela = document.getElementById('tabela');
      tabela.innerHTML = '';

      data.forEach(r => {
        tabela.innerHTML += `
          <tr>
            <td>${r.id}</td>
            <td>${r.nome}</td>
            <td>${r.capacidade}</td>
            <td>${r.horario_funcionamento || '-'}</td>
            <td>
              <button onclick="editar('${r.id}', '${String(r.nome).replace(/'/g, "\\'")}', ${r.capacidade}, '${String(r.horario_funcionamento || '').replace(/'/g, "\\'")}')">✏️</button>
              <button onclick="deletar('${r.id}')">🗑️</button>
            </td>
          </tr>
        `;
      });
    }

    async function inserir() {
      const nome = document.getElementById('nome').value.trim();
      const capacidade = document.getElementById('capacidade').value;
      const horario = document.getElementById('horario').value.trim();

      if (!nome || !capacidade) {
        alert('Preencha nome e capacidade.');
        return;
      }

      const { error } = await supabaseClient
        .from('restaurante')
        .insert([
          {
            nome,
            capacidade,
            horario_funcionamento: horario
          }
        ]);

      if (error) {
        alert('Erro ao salvar restaurante: ' + error.message);
      } else {
        limpar();
        buscar();
      }
    }

    function editar(id, nome, capacidade, horario) {
      idEditando = id;

      document.getElementById('nome').value = nome;
      document.getElementById('capacidade').value = capacidade;
      document.getElementById('horario').value = horario || '';

      document.getElementById('btnUpdate').style.display = 'inline';
    }

    async function atualizar() {
      if (!idEditando) return;

      const nome = document.getElementById('nome').value.trim();
      const capacidade = document.getElementById('capacidade').value;
      const horario = document.getElementById('horario').value.trim();

      if (!nome || !capacidade) {
        alert('Preencha nome e capacidade.');
        return;
      }

      const { error } = await supabaseClient
        .from('restaurante')
        .update({
          nome,
          capacidade,
          horario_funcionamento: horario
        })
        .eq('id', idEditando);

      if (error) {
        alert('Erro ao atualizar restaurante: ' + error.message);
      } else {
        limpar();
        buscar();
        idEditando = null;
        document.getElementById('btnUpdate').style.display = 'none';
      }
    }

    async function deletar(id) {
      if (!confirm('Deseja excluir este restaurante?')) return;

      const { error } = await supabaseClient
        .from('restaurante')
        .delete()
        .eq('id', id);

      if (error) {
        alert('Erro ao deletar restaurante: ' + error.message);
      } else {
        buscar();
      }
    }

    async function buscarClientes() {
      const { data, error } = await supabaseClient
        .from('cliente')
        .select('*');

      if (error) {
        alert('Erro ao buscar clientes: ' + error.message);
        return;
      }

      const tabelaClientes = document.getElementById('tabelaClientes');
      tabelaClientes.innerHTML = '';

      data.forEach(c => {
        tabelaClientes.innerHTML += `
          <tr>
            <td>${c.id}</td>
            <td>${c.nome}</td>
            <td>${c.cpf || '-'}</td>
            <td>${c.telefone || '-'}</td>
            <td>
              <button onclick="deletarCliente('${c.id}')">🗑️</button>
            </td>
          </tr>
        `;
      });
    }

    async function deletarCliente(id) {
      if (!confirm('Deseja excluir este cliente? Apague antes os itens de fila relacionados, se houver.')) return;

      const { error } = await supabaseClient
        .from('cliente')
        .delete()
        .eq('id', id);

      if (error) {
        alert('Erro ao deletar cliente: ' + error.message);
      } else {
        buscarClientes();
      }
    }

    async function buscarFila() {
      const { data, error } = await supabaseClient
        .from('fila_item')
        .select(`
          id,
          numero_pessoas,
          posicao,
          status,
          tempo_estimado,
          hora_entrada,
          cliente:cliente_id (
            id,
            nome,
            cpf,
            telefone
          ),
          restaurante:restaurante_id (
            nome
          )
        `)
        .order('posicao', { ascending: true });

      if (error) {
        alert('Erro ao buscar fila: ' + error.message);
        return;
      }

      const tabelaFila = document.getElementById('tabelaFila');
      tabelaFila.innerHTML = '';

      data.forEach(item => {
        tabelaFila.innerHTML += `
          <tr>
            <td>${item.id}</td>
            <td>${item.cliente?.nome || '-'}</td>
            <td>${item.cliente?.cpf || '-'}</td>
            <td>${item.cliente?.telefone || '-'}</td>
            <td>${item.restaurante?.nome || '-'}</td>
            <td>${item.numero_pessoas ?? '-'}</td>
            <td>${item.posicao ?? '-'}</td>
            <td>${item.status || '-'}</td>
            <td>${item.tempo_estimado != null ? item.tempo_estimado + ' min' : '-'}</td>
            <td>${item.hora_entrada ? new Date(item.hora_entrada).toLocaleString('pt-BR') : '-'}</td>
            <td>
              <button onclick="deletarFila('${item.id}')">🗑️</button>
            </td>
          </tr>
        `;
      });
    }

    async function deletarFila(id) {
      if (!confirm('Deseja excluir este item da fila?')) return;

      const { error } = await supabaseClient
        .from('fila_item')
        .delete()
        .eq('id', id);

      if (error) {
        alert('Erro ao deletar item da fila: ' + error.message);
      } else {
        buscarFila();
      }
    }

    function limpar() {
      document.getElementById('nome').value = '';
      document.getElementById('capacidade').value = '';
      document.getElementById('horario').value = '';
    }

    buscar();
    buscarClientes();
    buscarFila();
  </script>

</body>
</html>
