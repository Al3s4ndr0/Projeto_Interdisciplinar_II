<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qmesa - Experiência na fila</title>
  <link rel="stylesheet" href="../pags_css/experiencia_fila_style.css">
</head>
<body>

  <main class="screen">
    <section class="card">

      <header class="hero">
        <a href="../pags_html/acompanhar_fila_3.html" class="back-button" aria-label="Voltar">
          &#8592;
        </a>

        <div class="badge-circle">
          <img src="../images/logo_restaurante.png" alt="Logo do restaurante">
        </div>
      </header>

      <section class="content">
        <h1>AGORA É SÓ<br>APROVEITAR!</h1>

        <p class="description">
          Esperamos que sua experiência tenha sido
          positiva. Compartilha com a gente!
        </p>

        <div class="rating-block">
          <p class="question">Como foi o processo de espera?</p>

          <div class="stars">
            <input type="radio" id="star5" name="rating" value="5">
            <label for="star5">★</label>

            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4">★</label>

            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3">★</label>

            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2">★</label>

            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1">★</label>
          </div>
        </div>

        <div class="survey-block">
          <p class="question">O tempo de espera correspondeu ao informado?</p>

          <label class="option">
            <input type="radio" name="tempo_espera">
            <span>Sim, conforme previsto</span>
          </label>

          <label class="option">
            <input type="radio" name="tempo_espera">
            <span>Sim, esperei até menos que o previsto</span>
          </label>

          <label class="option">
            <input type="radio" name="tempo_espera">
            <span>Não, esperei um pouco mais que o previsto</span>
          </label>

          <label class="option">
            <input type="radio" name="tempo_espera">
            <span>Não, esperei muito mais que o previsto</span>
          </label>
        </div>

        <div class="comment-block">
          <p class="question">Gostaria de deixar algum comentário?</p>
          <textarea placeholder="Digite sua mensagem aqui"></textarea>
        </div>

        <div class="actions">
          <a href="../pags_html/agradecimento_avaliacao.html" class="btn btn-primary">Enviar avaliação</a>
        </div>
      </section>

      <footer class="footer-nav"></footer>

    </section>
  </main>

</body>
</html>
