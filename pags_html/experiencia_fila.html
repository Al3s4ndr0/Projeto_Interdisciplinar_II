      <section class="conteudo">
        <h1 class="titulo titulo-experiencia">AGORA Ã‰ SÃ“<br>APROVEITAR!</h1>

        <p class="descricao descricao-experiencia">
          Esperamos que sua experiÃªncia tenha sido positiva. Compartilha com a gente!

        <form id="formExperienciaFila">
          <section class="bloco-nota">

            <div class="estrelas">

          <section class="bloco-pesquisa-experiencia">

          <section class="bloco-comentario-experiencia">

    <div id="modalFeedbackExistente" class="modal">
      <div class="modal-conteudo">
        <h2>VocÃª jÃ¡ avaliou</h2>

        <div class="modal-acoes">
          <button class="botao-secundario" onclick="fecharModal()">
            Manter
          </button>

          <button class="botao-primario" onclick="editarFeedback()">
            Editar avaliaÃ§Ã£o

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseUrl = 'https://jlfbzdqhaezdtyyajqlk.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

const form = document.getElementById('formExperienciaFila');
const comentarioInput = document.getElementById('campoComentario');
const msg = document.getElementById('mensagemExperiencia');
const btn = document.getElementById('btnEnviarAvaliacao');

let clienteId = null;
let filaItemId = null;
let feedbackId = null;

function setMsg(texto, tipo='') {
  msg.textContent = texto;
  msg.style.color = tipo === 'erro' ? '#dc2626' : tipo === 'sucesso' ? '#16a34a' : '#555';
}

function abrirModal() {
  document.getElementById('modalFeedbackExistente').style.display = 'flex';
}
function fecharModal() {
  document.getElementById('modalFeedbackExistente').style.display = 'none';
}

function marcarNota(v) {
  const el = document.querySelector(`input[name="avaliacao"][value="${v}"]`);
  if (el) el.checked = true;
}

function marcarTempo(v) {
  const el = document.querySelector(`input[name="tempo_espera"][value="${v}"]`);
  if (el) el.checked = true;
}

async function obterClienteDaFila(id) {
  const { data, error } = await supabaseClient
    .from('fila_item')
    .select('cliente_id')
    .eq('id', id)
    .maybeSingle();

  if (error) throw error;
  return data?.cliente_id || null;
}

function editarFeedback() {
  fecharModal();

  // habilita ediÃ§Ã£o
  btnEnviarAvaliacao.disabled = false;

  // feedback visual
  setMensagemExperiencia('Edite sua avaliaÃ§Ã£o e clique em salvar.');

  // foco no comentÃ¡rio (melhora UX)
  campoComentario.focus();
}

async function init() {
  filaItemId = sessionStorage.getItem('fila_item_id');
  clienteId = sessionStorage.getItem('cliente_id');

  if (!filaItemId) {
    setMsg('Fila nÃ£o identificada.', 'erro');
    return;
  }

  if (!clienteId) {
    clienteId = await obterClienteDaFila(filaItemId);
  }

  if (!clienteId) {
    setMsg('Cliente nÃ£o identificado.', 'erro');
    return;
  }

  // âœ” AGORA NA ORDEM CORRETA
  const { data, error } = await supabaseClient
    .from('feedback')
    .select('*')
    .eq('cliente_id', clienteId)
    .eq('origem_id', filaItemId)
    .eq('origem_tipo', 'fila_item')
    .maybeSingle();

  if (error) {
    console.error(error);
    return;
  }

  if (data) {
    feedbackId = data.id;

    marcarNota(data.nota);
    marcarTempo(data.tempo_espera_resposta);
    comentarioInput.value = data.comentario || '';

    btn.textContent = 'Atualizar avaliaÃ§Ã£o';

    abrirModal();
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  if (btn.disabled) return;

  const nota = document.querySelector('input[name="avaliacao"]:checked');
  const tempo = document.querySelector('input[name="tempo_espera"]:checked');
  const comentario = comentarioInput.value.trim();

  if (!nota) return setMsg('Selecione uma nota.', 'erro');
  if (!tempo) return setMsg('Responda o tempo.', 'erro');

  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const payload = {
      cliente_id: clienteId,
      origem_id: filaItemId,
      origem_tipo: 'fila_item',
      nota: Number(nota.value),
      tempo_espera_resposta: tempo.value,
      comentario: comentario || null
    };

    const { error } = await supabaseClient
      .from('feedback')
      .upsert(payload, {
        onConflict: 'cliente_id,origem_id,origem_tipo'
      });

    if (error) throw error;

    setMsg('AvaliaÃ§Ã£o salva com sucesso!', 'sucesso');

    // â— NÃƒO remove session
    // â— mantÃ©m para permitir ediÃ§Ã£o

    setTimeout(() => {
      window.location.href = '/pags_html/agradecimento_avaliacao.html';
    }, 800);

  } catch (err) {
    console.error(err);
    setMsg('Erro ao salvar avaliaÃ§Ã£o.', 'erro');
    btn.disabled = false;
    btn.textContent = feedbackId ? 'Atualizar avaliaÃ§Ã£o' : 'Enviar avaliaÃ§Ã£o';
  }
});

init();
</script>
</body>
</html>
