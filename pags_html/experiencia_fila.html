<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Experiência na fila</title>
  <link rel="stylesheet" href="../pags_css/style.css" />
</head>
<body class="tema-fila">
  <main class="tela">
    <section class="cartao cartao-experiencia">

      <header class="painel-experiencia">
        <div class="acoes-topo">
          <a href="javascript:history.back()" class="botao-voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"/>
            </svg>
          </a>

          <a href="../pags_html/index.html" class="botao-home" aria-label="Ir para a tela inicial">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"/>
              <path d="M5.5 9.5V21h13V9.5"/>
              <path d="M9.5 21v-6h5v6"/>
            </svg>
          </a>
        </div>
      </header>

      <section class="conteudo">
        <h1 class="titulo titulo-experiencia">AGORA É SÓ<br>APROVEITAR!</h1>

        <p class="descricao descricao-experiencia">
          Esperamos que sua experiência tenha sido
          positiva. Compartilha com a gente!
        </p>

        <section class="bloco-nota">
          <p class="pergunta-experiencia">Como foi o processo de espera?</p>

          <div class="estrelas">
            <input type="radio" id="estrela5" name="avaliacao" value="5">
            <label for="estrela5">★</label>

            <input type="radio" id="estrela4" name="avaliacao" value="4">
            <label for="estrela4">★</label>

            <input type="radio" id="estrela3" name="avaliacao" value="3">
            <label for="estrela3">★</label>

            <input type="radio" id="estrela2" name="avaliacao" value="2">
            <label for="estrela2">★</label>

            <input type="radio" id="estrela1" name="avaliacao" value="1">
            <label for="estrela1">★</label>
          </div>
        </section>

        <section class="bloco-pesquisa-experiencia">
          <p class="pergunta-experiencia">O tempo de espera correspondeu ao informado?</p>

          <label class="opcao-experiencia">
            <input type="radio" name="tempo_espera">
            <span>Sim, conforme previsto</span>
          </label>

          <label class="opcao-experiencia">
            <input type="radio" name="tempo_espera">
            <span>Sim, esperei até menos que o previsto</span>
          </label>

          <label class="opcao-experiencia">
            <input type="radio" name="tempo_espera">
            <span>Não, esperei um pouco mais que o previsto</span>
          </label>

          <label class="opcao-experiencia">
            <input type="radio" name="tempo_espera">
            <span>Não, esperei muito mais que o previsto</span>
          </label>
        </section>

        <section class="bloco-comentario-experiencia">
          <p class="pergunta-experiencia">Gostaria de deixar algum comentário?</p>
          <textarea class="campo-comentario" placeholder="Digite sua mensagem aqui"></textarea>
        </section>

        <div class="acoes-experiencia">
          <a href="../pags_html/agradecimento_avaliacao.html" class="botao-primario">Enviar avaliação</a>
        </div>
      </section>

    </section>
  </main>
</body>
</html>
