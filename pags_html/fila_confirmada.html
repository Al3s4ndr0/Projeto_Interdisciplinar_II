<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qmesa - Entrou na fila</title>
  <link rel="stylesheet" href="/pags_css/style.css" />
</head>
<body class="tema-fila">
  <main class="tela">
    <section class="cartao-confirmada-novo">

      <section class="painel-esquerdo-confirmacao">
        <div class="acoes-topo-confirmada">
          <a href="javascript:history.back()" class="botao-circular-topo" aria-label="Voltar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6l-6 6 6 6"></path>
            </svg>
          </a>

          <a href="/pags_html/index.html" class="botao-circular-topo" aria-label="Ir para a tela inicial">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"></path>
              <path d="M5.5 9.5V21h13V9.5"></path>
              <path d="M9.5 21v-6h5v6"></path>
            </svg>
          </a>
        </div>
      </section>

      <section class="conteudo-confirmada-novo">
        <h1 class="titulo-confirmado">AGRADECEMOS POR AGUARDAR NA FILA</h1>
        <p class="subtitulo-confirmado">Estamos ansiosos para lhe atender</p>

        <p id="mensagemSucesso" class="mensagem-sucesso"></p>

        <div class="circulo-posicao" id="numeroFila">-</div>

        <p class="texto-posicao" id="textoPosicao">
          VocÃª estÃ¡ na fila.
        </p>

        <p class="texto-tempo" id="textoTempo">
          Seu tempo mÃ©dio de espera Ã© de:
        </p>

        <p class="texto-apoio">
          Clique em ACOMPANHAR para ver seu progresso na fila em tempo real.
        </p>

        <div class="acoes-confirmacao-novo">
          <button type="button" class="btn-confirmacao-principal" id="btnAcompanhar">
            Acompanhar
          </button>

          <button type="button" class="btn-confirmacao-secundario" id="btnCancelar">
            Cancelar reserva
          </button>
        </div>

        <p id="mensagemErro" class="mensagem-erro-confirmada"></p>
      </section>

    </section>
  </main>

  <!-- MODAL CANCELAMENTO -->
  <div id="modalCancelamento" class="modal">
    <div class="modal-conteudo">
      <h2>Cancelar reserva</h2>
      <p>Tem certeza que deseja sair da fila?</p>

      <div class="modal-acoes">
        <button type="button" class="botao-secundario" onclick="fecharModalCancelamento()">
          Voltar
        </button>
        <button type="button" class="botao-danger" onclick="confirmarCancelamento()">
          Cancelar fila
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseUrl = 'https://jlfbzdqhaezdtyyajqlk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZmJ6ZHFoYWV6ZHR5eWFqcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjM0NjksImV4cCI6MjA4ODkzOTQ2OX0.6VX3Z1FjxgZuBYALd2oU4bQl0nzbMcBUcc0nLW_DbvA';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const numeroFila = document.getElementById('numeroFila');
    const textoPosicao = document.getElementById('textoPosicao');
    const textoTempo = document.getElementById('textoTempo');
    const mensagemSucesso = document.getElementById('mensagemSucesso');
    const mensagemErro = document.getElementById('mensagemErro');
    const btnAcompanhar = document.getElementById('btnAcompanhar');
    const btnCancelar = document.getElementById('btnCancelar');
    const modalCancelamento = document.getElementById('modalCancelamento');

    const STATUS_EM_FILA = ['Aguardando', 'Preparando', 'Chamado', 'A caminho'];
    const TEMPO_MEDIO_POR_POSICAO = 10;

    function limparEstadoFila() {
      sessionStorage.removeItem('fila_ativa');
      sessionStorage.removeItem('fila_nome');
      sessionStorage.removeItem('fila_cpf');
      sessionStorage.removeItem('fila_telefone');
      sessionStorage.removeItem('fila_qtd_pessoas');
      sessionStorage.removeItem('fila_posicao');
      sessionStorage.removeItem('fila_tempo_estimado');
      sessionStorage.removeItem('fila_item_id');
      sessionStorage.removeItem('cliente_id');
      sessionStorage.removeItem('fila_mensagem_sucesso');
      sessionStorage.removeItem('fila_status_anterior');
      sessionStorage.removeItem('fila_posicao_anterior');
    }

    function ordinalPorExtenso(posicao) {
      const numero = Number(posicao);

      if (!numero || numero < 1) return '-';

      const mapa = {
        1: 'PRIMEIRO',
        2: 'SEGUNDO',
        3: 'TERCEIRO',
        4: 'QUARTO',
        5: 'QUINTO',
        6: 'SEXTO',
        7: 'SÃ‰TIMO',
        8: 'OITAVO',
        9: 'NONO',
        10: 'DÃ‰CIMO'
      };

      return mapa[numero] || `${numero}Âº`;
    }

    function exibirMensagemSucesso() {
      const texto = sessionStorage.getItem('fila_mensagem_sucesso');
      if (texto) {
        mensagemSucesso.textContent = texto;
      }
    }

    function abrirModalCancelamento() {
      modalCancelamento.style.display = 'flex';
    }

    function fecharModalCancelamento() {
      modalCancelamento.style.display = 'none';
    }

    async function carregarFilaConfirmada() {
      const filaItemId = sessionStorage.getItem('fila_item_id');

      if (!filaItemId) {
        limparEstadoFila();
        window.location.href = 'login_entrar_fila.html';
        return;
      }

      mensagemErro.textContent = '';

      try {
        const { data: fila, error } = await supabaseClient
          .from('fila_item')
          .select(`
            id,
            restaurante_id,
            posicao,
            status,
            tempo_estimado,
            hora_entrada
          `)
          .eq('id', filaItemId)
          .maybeSingle();

        if (error) {
          throw error;
        }

        if (!fila) {
          limparEstadoFila();
          window.location.href = 'login_entrar_fila.html';
          return;
        }

        if (!STATUS_EM_FILA.includes(fila.status)) {
          if (fila.status === 'Atendido') {
            window.location.href = 'experiencia_fila.html';
          } else {
            limparEstadoFila();
            window.location.href = 'login_entrar_fila.html';
          }
          return;
        }

        const { data: filaAtiva, error: erroFilaAtiva } = await supabaseClient
          .from('fila_item')
          .select('id, status, hora_entrada')
          .eq('restaurante_id', fila.restaurante_id)
          .in('status', STATUS_EM_FILA)
          .order('hora_entrada', { ascending: true });

        if (erroFilaAtiva) {
          throw erroFilaAtiva;
        }

        const indiceAtual = (filaAtiva || []).findIndex(item => item.id === fila.id);
        const posicaoAtual = indiceAtual >= 0 ? indiceAtual + 1 : '-';
        const tempoEstimadoAtual = indiceAtual >= 0
          ? (indiceAtual + 1) * TEMPO_MEDIO_POR_POSICAO
          : (fila.tempo_estimado ?? '-');

        numeroFila.textContent = posicaoAtual;
        textoPosicao.innerHTML = `VocÃª Ã© o <strong>${ordinalPorExtenso(Number(posicaoAtual))}</strong> na fila`;
        textoTempo.innerHTML = `Seu tempo mÃ©dio de espera Ã©:<br>${tempoEstimadoAtual} minuto(s)`;

        sessionStorage.setItem('fila_ativa', 'true');
        sessionStorage.setItem('fila_posicao', posicaoAtual);
        sessionStorage.setItem('fila_tempo_estimado', tempoEstimadoAtual);
      } catch (erro) {
        console.error('Erro ao carregar fila confirmada:', erro);
        mensagemErro.textContent = 'NÃ£o foi possÃ­vel consultar sua fila agora. Tente novamente.';
      }
    }

    async function confirmarCancelamento() {
      const filaItemId = sessionStorage.getItem('fila_item_id');
      const clienteId = sessionStorage.getItem('cliente_id');

      if (!filaItemId) {
        limparEstadoFila();
        window.location.href = 'login_entrar_fila.html';
        return;
      }

      btnCancelar.disabled = true;
      btnCancelar.textContent = 'Cancelando...';
      mensagemErro.textContent = '';

      try {
        const { error } = await supabaseClient
          .from('fila_item')
          .update({
            status: 'Cancelado',
            posicao: 0,
            tempo_estimado: 0
          })
          .eq('id', filaItemId);

        if (error) {
          throw error;
        }

        // salva referÃªncia do cancelamento para o fluxo de comentÃ¡rio
        sessionStorage.setItem('fila_cancelada_item_id', filaItemId);
        sessionStorage.setItem('fila_cancelada_cliente_id', clienteId || '');

        fecharModalCancelamento();
        limparEstadoFila();
        window.location.href = 'cancelamento_confirmado.html';
      } catch (erro) {
        console.error('Erro ao cancelar fila:', erro);
        mensagemErro.textContent = 'NÃ£o foi possÃ­vel cancelar sua fila no momento. Tente novamente.';
        btnCancelar.disabled = false;
        btnCancelar.textContent = 'Cancelar reserva';
      }
    }

    function cancelarFila() {
      abrirModalCancelamento();
    }

    btnAcompanhar.addEventListener('click', () => {
      window.location.href = 'acompanhar_fila.html';
    });

    btnCancelar.addEventListener('click', cancelarFila);

    window.addEventListener('click', (event) => {
      if (event.target === modalCancelamento) {
        fecharModalCancelamento();
      }
    });

    exibirMensagemSucesso();
    carregarFilaConfirmada();

    setInterval(() => {
      carregarFilaConfirmada();
    }, 5000);
  </script>
</body>
</html>
